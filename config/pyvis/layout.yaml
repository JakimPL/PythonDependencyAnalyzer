mode: hierarchical

ring:
  node_spacing: 100
  ring_spacing: 250
  min_radius: 400
  dependency_blend: 1.0
  edge_pull: 1.0
  order_iterations: 40
  nudge_passes: 20
  repulsion: 200.0
  repulsion_iterations: 40
  wedge_margin: 0.0
  jitter: 0.0
  seed: 0

relaxation:
  enabled: false
  solver: forceAtlas2Based
  gravity: -50
  central_gravity: 0.003
  spring_length: 200
  spring_constant: 0.004
  damping: 0.9
  stabilization_iterations: 150
  anchor_centers: false
